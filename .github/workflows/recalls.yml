name: Monthly recall & complaint check

on:
  schedule:
    # 09:00 UTC on the 1st of every month
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-recalls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run check-recalls
      - name: Commit updated recall data
        run: |
          git config user.name "garage-log-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/vehicles/*/recalls.yaml
          git diff --cached --quiet || git commit -m "Monthly recall & complaint check"
          git push
