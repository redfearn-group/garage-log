complaints:
  - component: ELECTRICAL SYSTEM
    summary: >-
      I am filing a safety complaint regarding an Engine Control Module (ECM) failure in my 2017
      Subaru Impreza and the handling of a prior recall repair.  Dealership records show that a
      recall repair (WRE21 – ignition coil recall) was completed in June 2021. At that time, the
      dealership documented that the ECM calibration was up to date and functioning properly. 
      However, I later experienced a check engine light and drivability concerns. Diagnostic records
      from February 2026 indicate: •Camshaft slow response codes •Persistent sensor issues •A
      technician recommendation to replace multiple components, including the ECM, stating that
      codes were “burned into the ECM”  The dealership has since attempted to attribute the ECM
      failure to “engine sludge” and lack of maintenance.  Concern with Dealership Explanation: 
      This explanation is inconsistent and raises serious concerns: •Engine sludge is a mechanical
      lubrication issue and does not directly cause an ECM (electronic control module) to fail or
      become “burned.” •The ECM is an electronic unit, and failure typically results from electrical
      defects, internal faults, or manufacturing issues—not oil sludge. •The dealership has not
      provided technical evidence showing how sludge could damage or “burn” the ECM. •This appears
      to be an attempt to shift responsibility away from a potential defect or improperly completed
      recall repair.  Safety Concern:  The ECM is critical to safe vehicle operation. A failure can
      result in: •Engine malfunction or reduced power •Unpredictable vehicle behavior •Increased
      risk while driving  If ECM failures are being misdiagnosed or incorrectly attributed to
      maintenance issues, this could allow serious safety defects to go unaddressed.  Requested
      Action:  I request that NHTSA: 1.Investigate whether ECM failures are being improperly
      attributed to maintenance issues such as engine sludge. 2.Review whether the recall repair
      (WRE21) was properly completed and whether it is related to thi
    dateReceived: 04/16/2026
