  - component: POWER TRAIN
    summary: >-
      Premature failure of wheel bearings.  Both rear wheel bearings had to be replaced after only
      54,192 miles.  Technician indicated that replacements were upgraded "sealed" systems.  At
      73,712 miles the front driver's side wheel bearing was also replaced by the dealer after the
      same symptoms of excessive noise and poor mileage occurred.  Concern is that high resistance
      in the failing bearings creates a lot of heat and could eventually cause catastrophic
      failure.  In 40+ years of driving and owning cars with mileage accruals up to 229,000, this is
      the only one that ever required a wheel bearing replacement.  This, and the technician's
      reference to upgraded bearings makes me believe that this is a manufacturing defect that
      should have been covered by a recall.
    dateReceived: 08/23/2025
  - component: UNKNOWN OR OTHER
