lastChecked: '2026-07-10'
recalls:
  - campaignNumber: 21V264000
    component: ELECTRICAL SYSTEM:SOFTWARE
    summary: >-
      Subaru of America, Inc. (Subaru) is recalling certain 2017-2019 Subaru Impreza and 2018-2019
      Crosstrek vehicles.  The Engine Control Module (ECM) may continue to power the ignition coil
      after the engine is shut off, causing a short circuit.
    reportedDate: 15/04/2021
  - campaignNumber: 19V744000
    component: ENGINE AND ENGINE COOLING:EXHAUST SYSTEM:EMISSION CONTROL:CRANKCASE (PCV)
    summary: >-
      Subaru of America, Inc. (Subaru) is recalling certain 2017-2018 Impreza and 2018 Crosstrek
      vehicles equipped with an aluminum Positive Crankcase Ventilation (PCV) valve.  The PCV valve
      may come apart, allowing the separated components to enter the engine, possibly resulting in a
      loss of power while driving.
    reportedDate: 17/10/2019
  - campaignNumber: 19V745000
    component: ENGINE AND ENGINE COOLING:EXHAUST SYSTEM:EMISSION CONTROL:CRANKCASE (PCV)
    summary: >-
      Subaru of America, Inc. (Subaru) is recalling certain 2017 Impreza vehicles equipped with an
      aluminum Positive Crankcase Ventilation (PCV) valve.  The PCV valve may come apart, allowing
      the separated components to enter the engine, possibly resulting in a loss of power while
      driving.
    reportedDate: 17/10/2019
  - campaignNumber: 19V743000
    component: ELECTRICAL SYSTEM:SOFTWARE
    summary: >-
      Subaru of America, Inc. (Subaru) is recalling certain 2017-2019 Impreza and 2018-2019
      Crosstrek vehicles.  The Engine Control Module (ECM) may continue to power the ignition coil
      after the engine is shut off, which could result in a short circuit and blown fuse.
    reportedDate: 18/10/2019
  - campaignNumber: 17V216000
    component: FUEL SYSTEM, GASOLINE:DELIVERY:HOSES, LINES/PIPING, AND FITTINGS
    summary: >-
      Subaru of America, Inc. (Subaru) is recalling certain 2017 Impreza vehicles.  Winter fuels may
      vaporize prematurely in the fuel line, resulting in a reduction in fuel pressure, possibly
      causing the engine to stall.
    reportedDate: 29/03/2017
  - campaignNumber: 17V132000
    component: 'BACK OVER PREVENTION: CAMERA SYSTEM'
    summary: >-
      Subaru of America, Inc. (Subaru) is recalling certain 2017 Impreza vehicles.  Due to a
      software problem, the rearview camera display may not work properly.
    reportedDate: 02/03/2017
  - campaignNumber: 22V624000
    component: EXTERIOR LIGHTING:HEADLIGHTS
    summary: >-
      Subaru of America, Inc. (Subaru) is recalling certain 2017-2019 Impreza vehicles.  The left
      and right side reflex reflector and left side low beam reflector may inadequately reflect
      light.  As such, these vehicles fail to comply with the requirements of Federal Motor Vehicle
      Safety Standard number 108, "Lamps, Reflective Devices, and Associated Equipment."
    reportedDate: 12/08/2022
