  - id: 11
    title: CVT fluid drain & fill — Subaru CVTF-II, fluid already on hand
    notes: >-
      From the April 2026 post-purchase checklist (~134,783 mi) — fluid
      acquired, just needs to actually be done. Per schedule.yaml: must be
      genuine CVTF-II (green, SOA427V1660/SOA427V1610) — NEVER the orange
      High Torque CVTF, which is chemically different and a documented
      cause of CVT damage on the wrong platform. Confirm the bottle before
      pouring. COMMUNITY NOTE: independent CVT shops report a dramatically
      higher failure rate on Subaru CVTs that never get a fluid change
      despite the US "lifetime fluid" marketing. Subaru Canada's official
      guide lists CVT fluid at 110,000 km/66 months (~68,000 mi) — a real
      factory interval. Separately, forum threads reference a shorter
      Japan-market interval around 30,000-36,000 mi/km (not pinned to a
      primary JDM document, but corroborated across multiple threads) —
      worth doing now given this car's unknown prior service history at
      ~140K mi. This service covers the AWD transfer clutch pack, which
      shares CVT fluid with no separate fill of its own — but does NOT
      cover the front differential, which has its own separate gear-oil
      fill (see task #1). See schedule.yaml's DRIVELINE COMPONENT AUDIT
      note for the full mechanical breakdown.

      PLANNED 2026-07-22: Brady is targeting the weekend of 2026-07-25 for
      this, alongside the front/rear differential fluid (task #1).
    status: open
    createdDate: '2026-07-14'
    completedDate: null
