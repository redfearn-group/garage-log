tasks:
  - id: 1
    title: Rear & center differential fluid — identify correct spec before servicing
    notes: >-
      Subaru lists three non-interchangeable gear oils (Extra MT 75W80,
      High Performance 75W90, and 80W90 LSD) with no single confirmed
      answer for which applies to this exact AWD Impreza's rear
      differential. Verify by VIN at a dealer parts counter before buying
      — do not guess between the three.
    status: open
    createdDate: '2026-07-11'
    completedDate: null
  - id: 2
    title: Accessory drive belt inspection
    notes: >-
      No timing belt on this FB20 chain engine, but the accessory belt
      still needs a visual + groove-depth gauge check (modern EPDM belts
      don't crack visibly with age the way older belts did).
    status: open
    createdDate: '2026-07-11'
    completedDate: null
