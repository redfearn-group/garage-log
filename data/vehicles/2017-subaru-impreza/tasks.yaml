  - id: 6
    title: 'Ask dealer about TSB WTT-79R if AC-related hesitation has occurred'
    notes: >-
      Not a recall (won't show in the automated NHTSA recall check) — a
      free ECM software reprogram for a hot-weather AC stall / idle-drop
      condition (DTC P1603) on 2017-2019 Impreza. Only relevant if the car
      has ever hesitated or nearly stalled at low speed with the AC on in
      hot weather. No parts needed if it applies.
    status: open
    createdDate: '2026-07-11'
    completedDate: null
  - id: 7
    title: Verify VIN-specific status of 3 additional recalls not confirmed by name
    notes: >-
      The source research flagged a headlight reflector recall, a fuel
      line vaporization recall, and a rearview camera software recall as
      "check by VIN" without full campaign numbers. The automated monthly
      recall check here pulls by make/model/year and should surface the
      two confirmed ones (ignition coil short/stall — 21V-264 — and PCV
      valve fragments — 19V-744/19V-745), but do a VIN-specific check at
      nhtsa.gov/recalls to make sure nothing's been missed.
    status: open
    createdDate: '2026-07-11'
    completedDate: null
  - id: 8
    title: 'Check engine light + traction control light on as of 2026-07-12 (140,837 mi)'
    notes: >-
      Today's odometer photo (140,837 mi) shows the CHECK ENGINE light and
      the amber traction-control-off icon both lit, plus a red BRAKE
      indicator and seatbelt icon (likely just parking-brake-engaged/seatbelt
      reminders while parked in P, not necessarily faults). Worth pulling
      codes with an OBD-II reader before doing anything else — no other
      symptoms reported yet.
    status: open
    createdDate: '2026-07-12'
    completedDate: null
