tasks:
  - id: 1
    title: 'Front & rear differential fluid — both fills already on hand, just needs the swap'
    notes: >-
      Subaru lists three non-interchangeable gear oils (Extra MT 75W80,
      High Performance 75W90, and 80W90 LSD) with no single confirmed
      answer for which applies to this exact AWD Impreza — originally
      flagged to verify by VIN before buying. Brady has since acquired a
      case of 4 qt Valvoline 75W-90 synthetic gear oil (per
      maintenance-log.yaml, purchased 2026-03-14) — enough to cover BOTH
      the front differential (~1.3-1.35 qt) and the rear differential
      (~1 qt), just needs the swap on both. MECHANICAL NOTE (2026-07-16,
      see schedule.yaml's DRIVELINE COMPONENT AUDIT): despite being housed
      within the same case as the CVT, the front differential has its own
      separate fill/drain/check plugs and its own 75W-90 gear oil — it is
      NOT serviced by the CVT fluid change (task #11), and IS a genuinely
      separate service from the rear differential. Do both while under the
      car for this service — schedule.yaml tracks them as two separate
      items (front-differential-fluid, rear-differential-fluid) so neither
      gets silently skipped, even though they're done in the same visit.
      COMMUNITY NOTE: Subaru Canada's official maintenance guide lists
      front/rear differential gear oil replacement at 110,000 km/66
      months (~68,000 mi) — a real factory interval, not a forum guess.
      US severe-duty spec already calls for a 15,000 mi change; forum
      consensus for normal-use proactive replacement (not just
      inspection) is 50,000-60,000 mi with synthetic gear oil — given
      this car's unknown prior service history, doing the swap now rather
      than waiting is reasonable regardless of exact mileage.

      PLANNED 2026-07-22: Brady is targeting the weekend of 2026-07-25 for
      this, alongside the CVT fluid change (task #11).
    status: open
    createdDate: '2026-07-11'
    completedDate: null
