dates:
  - type: extended-warranty
    label: 'CARCHEX M2M Powertrain Gold Select — active, renews monthly'
    dueDate: '2026-09-14'
    notes: >-
      Contract #CHXM5745679, administered by American Auto Shield, Ltd
      (claims 800-823-2741, roadside 866-222-7869). Purchased 2026-04-15 at
      135,271 mi, $99.99/mo + $7.45 tax = $107.44/mo, month-to-month
      (renews automatically until cancelled — no fixed end date). Waiting
      period: 25 days & 500 mi, or 40 days & 250 mi from the effective
      date. Deductible $1,000 for the initial term + next 2 renewals (3
      months total), then $250 thereafter (except $500 for engine or
      transmission replacement/rebuild). Covers Engine, Transmission,
      Cooling System, Transfer Unit (4x4), Drive Axle, A/C, Alternator,
      Starter, Power Window Motors, seals & gaskets — aftermarket parts not
      covered. Also includes roadside assistance, rental/rideshare
      coverage (up to $60/day, 7 days), and trip interruption. Cancel
      anytime with no future payment obligation — pro-rata refund of the
      current month less a $100 cancel fee and any claims paid; $100 cancel
      fee doesn't apply if cancelled within the very first month. Brady
      plans to keep this active for a couple more months (as of 2026-07-14)
      to cover Draco through the post-purchase shakeout period, then
      cancel — dueDate above is a rough target, not a firm date. Full
      contract and confirmation email filed privately at
      2017-subaru-impreza/warranty/.

