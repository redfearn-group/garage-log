recalls:
  - campaignNumber: 20V543000
    component: >-
      SERVICE BRAKES, HYDRAULIC:ANTILOCK/TRACTION CONTROL/ELECTRONIC LIMITED SLIP:CONTROL
      UNIT/MODULE
    summary: >-
      Hyundai is recalling certain 2019-2021 Tucson vehicles (campaign later expanded to include
      some 2016-2018 models). The Anti-lock Brake Hydraulic Electronic Control Unit (HECU) may
      corrode internally, causing an electrical short that can ignite an engine compartment fire —
      including while parked with the engine off. Dealers will replace the HECU fuse at no cost;
      2019-2021 models also receive an Electronic Stability Control software update. Hyundai's
      guidance until repaired: park outside and away from structures. Not yet confirmed whether this
      specific VIN has had the repair done — worth checking before anything else on this car.
    reportedDate: 22/09/2020
