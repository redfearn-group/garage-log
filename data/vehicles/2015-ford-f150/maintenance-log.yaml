  - date: '2026-01-30'
    mileage: 152431
    itemType: ''
    description: Heated/cooled seat module (SCME) connector repair — DIY
    notes: >-
      Front driver/passenger seat heat & AC blower had stopped working;
      diagnosed as a burnt SCME (seat climate module) connector. Fixed via
      a HOPUT WPT928 wiring-kit connector replacement (Amazon order placed
      2026-01-22, ~$19.33, installed ~2026-01-30). A separate Tim Dahle
      Ford estimate dated 2026-01-09 (filed in the private repo,
      2015-ford-f150/repair-invoice/20260109-tim-dahle-ford-estimate.png)
      quotes the same repair at $1,302.13 — that was for buying backup/
      spare parts (SCME computer + dongle) from the dealer after the DIY
      fix was already done, not a separate repair event. Mileage
      interpolated between the 2025-11-25 (150,002 mi) and 2026-02-21
      (153,240 mi) readings — an estimate, not an exact reading. Note:
      the Carchex extended warranty (see admin-dates.yaml) was borderline
      still active at this mileage (expired at 152,412 mi / 2026-05-11)
      — a claim might have covered this repair for a $100 deductible, but
      it wasn't filed; DIY was already done before this was noticed.
