dates:
  - type: extended-warranty
    label: 'Carchex "Ultimate Direct" extended warranty — EXPIRED'
    dueDate: '2026-05-11'
    notes: >-
      Plan "Ultimate Direct," purchased 2022-05-11 for $3,882.45, financed
      as 12 monthly payments (paid off well before the coverage itself
      expired). 48 months / 48,000 miles from a starting odometer of
      104,412 mi — expired at whichever came first: 2026-05-11 or
      152,412 mi. Current mileage (155,407.7 as of 2026-07-12) is already
      past the mileage cutoff, and the date cutoff has also passed — this
      warranty is no longer active. $100 deductible while it was active,
      $50,000 (or Actual Cash Value, whichever lesser) limit of liability,
      30-day/1,000-mile waiting period from purchase. Broad "Supreme"
      mechanical/electrical breakdown coverage, but routine maintenance
      (fluids, filters, coolant, diff/transmission service) was excluded
      unless required by an actual breakdown — so it would not have
      covered the pre-sale service items in task #3 even while active.
      Actually used at least three times: 2022-09-12 (Clegg Auto, rear
      pinion seal + oil pan gasket) paid $998.01 of a $1,369.73 repair;
      2023-12-27 (Tim Dahle Ford, pinion seal again + timing cover reseal
      + rear main seal) paid the bulk of a $5,864.53 gross repair down to
      just $533 out of pocket; and a third time at 2025-12-09 (Tim Dahle
      Ford) when the vacuum pump was replaced under warranty while the
      contract was still active at 151,830 mi. That 2025-12-09 invoice's
      printed total due was $3,428.72 including customer-pay items (seat
      lumbar adjuster, backup camera, folding-mirror switch, front axle
      seal, rental); a handwritten ~$940–1,050 out-of-pocket figure on it
      is ambiguous/unverified. Across these claims the warranty paid out
      several times its own $3,882.45 purchase price. See
      maintenance-log.yaml for all three repair visits. Full contract,
      administrator, claims-contact, and financing details filed
      privately.
      ADMINISTRATOR CHAIN — FLAGGED, NOT FULLY RESOLVED (2026-07-22 document
      sweep): the contract involves at least three differently-named
      entities and the source documents don't tie them together explicitly.
      (1) Carchex is the seller/broker. (2) Carchex's own portal and the
      physical "quick reference card" both list the "Administrator" as
      "Allegiance" with claims line 1-877-356-1500 — but the actual sample
      Vehicle Service Contract terms document (Ultimate Direct,
      ABIC-ULTIMATE DIRECT-01) names the Provider/Administrator as "Scioto
      Administrators Corporation" (Dublin, OH) with a DIFFERENT claims line,
      (800) 457-7703, and the underwriting insurer as American Bankers
      Insurance Company of Florida — "Allegiance" does not appear anywhere
      in that contract text. (3) The 2023-12-27 Tim Dahle repair order
      (RO #893785) instructs the shop to send the final warranty invoice to
      claimpayments@rps-tpa.com — i.e., RPS-TPA was already handling actual
      claim payment processing back in Dec 2023, well before any mention of
      "Renascent Protection Solutions, LLC" turned up in Gmail. This is
      consistent with RPS-TPA being Renascent's third-party-administrator
      claims-processing operation for this contract, but none of the
      documents on file state that connection explicitly — it's an
      inference, not a confirmed fact. There's also a minor roadside-number
      mismatch: the quick reference card prints 866-222-7869, while the
      Carchex portal (both an older 2025 screenshot and the current view)
      prints 866-994-4667. Bottom line: coverage dates, mileage, and the
      $100 deductible are solid (corroborated by 3 independent sources —
      contract terms doc, Carchex portal, quick reference card), but which
      company actually answers the phone for a claim, and how Renascent/
      RPS-TPA fits into Carchex → Allegiance → Scioto Administrators →
      American Bankers Insurance, is unresolved. Worth asking Carchex or
      checking the physical confirmation-package mailer (referenced in the
      2022-05-12 order-confirmation email, "sent within 7-14 business days")
      if it still exists — it may name the actual claims TPA more plainly
      than any document currently on file.
