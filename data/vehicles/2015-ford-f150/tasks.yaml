tasks:
  - id: 1
    title: 'Get open recall fixed before selling: 26V237 (transmission downshift)'
    notes: >-
      Confirmed OPEN via nhtsa.gov/recalls VIN-specific lookup on
      2026-07-10 (1 unrepaired recall on this VIN). NHTSA 26V237 / Ford
      26S28: transmission range sensor signal loss can cause an
      unexpected downshift to a lower gear, abruptly slowing the rear
      tires and risking loss of vehicle control. Free fix — Ford dealer
      reprograms the PCM via software update; if a MIL or powertrain
      warning lamp is on before or after, they'll run diagnostics and
      replace the leadframe at no cost under extended warranty program
      26N04. Worth doing before the sale — it's free, quick, and an
      unresolved safety recall is a bad look (and possible disclosure
      issue) for a buyer to find later.
    status: open
    createdDate: '2026-07-10'
    completedDate: null
  - id: 2
    title: 'Recurring check engine light across years — possibly connected to the open recall (task #1)'
    notes: >-
      Reviewing dashboard photos across the full mileage history: the
      check engine light is lit in multiple photos spanning 2020-01-23
      (73,512 mi), 2025-04-07 (140,842 mi), 2025-11-25 (150,002 mi), and
      2026-02-21 (153,240 mi) — recurring over 6 years, not a one-time
      fluke. Worth cross-referencing with task #1: recall 26V237's own
      description says the transmission fault "may cause a malfunction
      indicator lamp (MIL) and/or powertrain warning lamp wrench symbol"
      to appear before an unintended downshift — so this recurring CEL
      history could actually be evidence of this exact fault happening
      repeatedly over years, not a separate unrelated issue. When the
      dealer does the recall fix, ask them to pull stored/historical DTCs
      first if possible, rather than just clearing the current code — it
      may confirm (or rule out) that connection. Given the truck is being
      sold, worth resolving and understanding before the sale either way.
    status: open
    createdDate: '2026-07-11'
    completedDate: null
