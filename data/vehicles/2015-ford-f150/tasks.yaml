tasks:
  - id: 1
    title: 'CRITICAL — get open recall fixed: 26V237 (transmission downshift)'
    notes: >-
      Confirmed CRITICAL priority by Brady on 2026-07-17. Confirmed OPEN
      via nhtsa.gov/recalls VIN-specific lookup on 2026-07-10, re-confirmed
      "Recall incomplete" on ford.com with the VIN on 2026-07-17 (1
      unrepaired recall on this VIN).

      PLAIN-LANGUAGE EXPLANATION (Brady wasn't sure what this meant):
      a sensor inside the automatic transmission (the "transmission range
      sensor") can lose signal to the truck's computer. When that happens,
      the transmission can suddenly shift down into a much lower gear WHILE
      DRIVING, with no warning and no input from the driver. That abrupt
      downshift can make the rear tires slow down far faster than the
      truck's actual road speed, causing them to slide/lose traction — in
      plain terms, this can cause a sudden loss of vehicle control, which
      is a real crash risk, not a minor issue. A warning sign: a check
      engine light or a "powertrain" wrench-symbol dash light may come on
      before it happens.

      THE FIX: completely free at any Ford dealer — they reprogram the
      transmission's computer (PCM) with updated software, no parts needed
      for most trucks. If a MIL/powertrain warning lamp was on before or
      after the update, they'll run further diagnostics, and if specific
      transmission trouble codes are found, they'll also replace an
      internal part called the "leadframe" at no cost under a separate
      extended warranty program, 26N04 — this is the SAME item that also
      appears as a standalone "Customer Satisfaction Program" entry on
      ford.com; it's not a separate issue, just the conditional follow-on
      repair for this same recall.

      Worth doing soon regardless of the planned sale — it's free, quick,
      and fixes a genuine safety issue, not just a pre-sale disclosure
      concern.
    status: open
    createdDate: '2026-07-10'
    completedDate: null
  - id: 2
    title: 'Recurring check engine light across years — possibly connected to the open recall (task #1)'
    notes: >-
      Reviewing dashboard photos across the full mileage history: the
      check engine light is lit in multiple photos spanning 2020-01-23
      (73,512 mi), 2025-04-07 (140,842 mi), 2025-11-25 (150,002 mi), and
      2026-02-21 (153,240 mi) — recurring over 6 years, not a one-time
      fluke. Worth cross-referencing with task #1: recall 26V237's own
      description says the transmission fault "may cause a malfunction
      indicator lamp (MIL) and/or powertrain warning lamp wrench symbol"
      to appear before an unintended downshift — so this recurring CEL
      history could actually be evidence of this exact fault happening
      repeatedly over years, not a separate unrelated issue. When the
      dealer does the recall fix, ask them to pull stored/historical DTCs
      first if possible, rather than just clearing the current code — it
      may confirm (or rule out) that connection. Given the truck is being
      sold, worth resolving and understanding before the sale either way.
    status: open
    createdDate: '2026-07-11'
    completedDate: null
