      maintenance-log.yaml.
  - filename: 20221004-clegg-auto-pinion-seal-followup.pdf
    category: repair-invoice
    dateAdded: '2026-07-14'
    description: >-
      Clegg Auto Spanish Fork, 2022-10-04 (108,838 mi) — rear
      differential pinion seal + flange replaced again as a warranty
      follow-up to the 2022-09-12 Clegg repair, $95.25. See
      maintenance-log.yaml.
  - filename: 20221222-tim-dahle-recalls-brake-line-valve-cover.pdf
    category: repair-invoice
    dateAdded: '2026-07-14'
    description: >-
      Tim Dahle Ford, 2022-12-22 (111,520 mi) — blown left-
      front brake line replaced + brake fluid flush, passenger valve cover
