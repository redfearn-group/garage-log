      performed. $1,208.92 out of pocket (not a warranty claim). See
      maintenance-log.yaml.
  - filename: 20230509-tim-dahle-emissions-wfm-package.pdf
    category: repair-invoice
    dateAdded: '2026-07-14'
    description: >-
      Tim Dahle Ford, 2023-05-09 (117,125 mi) — emission (I/M)
      inspection + purchase of a 3-visit synthetic-blend Worry Free
      Maintenance package with its 1st oil-change/rotation visit redeemed,
      $231.96. See maintenance-log.yaml.
  - filename: 20250225-tim-dahle-wfm-visit3-valve-cover.pdf
    category: repair-invoice
    dateAdded: '2026-07-14'
    description: >-
      Tim Dahle Ford, 2025-02-25 (140,142 mi) — WFM 3rd/final
      visit (oil change, rotation, MPI) plus the passenger-side valve cover
      replaced (found cracked), $113.07 out of pocket. Includes the card
      transaction receipt. See maintenance-log.yaml.
  - filename: 20251209-tim-dahle-vacuum-pump-camera-mirror-axle.pdf
    category: repair-invoice
    dateAdded: '2026-07-14'
    description: >-
      Tim Dahle Ford, 2025-12-09 to 2025-12-31 (151,830 mi) —
      large multi-item repair: vacuum pump replaced (under warranty),
      driver's seat lumbar adjuster, backup camera, folding-mirror switch,
      front axle seal + rear axle oil, plus a rental. Printed total due
      $3,428.72; the Carchex warranty (still active) covered the vacuum
      pump, with an ambiguous handwritten ~$940–1,050 out-of-pocket figure.
      See maintenance-log.yaml and admin-dates.yaml.
  - filename: 20220912-clegg-auto-pinion-seal-oil-pan-repair.pdf
    category: repair-invoice
    dateAdded: '2026-07-14'
