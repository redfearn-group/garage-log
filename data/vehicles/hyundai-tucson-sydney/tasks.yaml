  - id: 3
    title: 'Check open-recall repair status: HECU fire recall (20V543000)'
    notes: >-
      A real, safety-critical NHTSA recall applies to this VIN's model
      year: the ABS Hydraulic Electronic Control Unit can corrode internally
      and short, risking an engine-compartment fire — even while parked
      with the engine off. Free fix (fuse replacement + ESC software
      update on 2019-2021 models). Not yet confirmed whether this specific
      VIN has had it done — check at nhtsa.gov/recalls with the VIN, or
      call Hyundai at 1-855-371-9460. Worth prioritizing above routine
      maintenance given the fire risk and the "park outside" guidance.
    status: open
    createdDate: '2026-07-16'
    completedDate: null
  - id: 4
    title: 'Check for open Hyundai engine service campaigns (966/982 KSDS) via VIN lookup'
    notes: >-
      Hyundai/Kia ran large "Knock Sensor Detection System" (KSDS) service
      campaigns and a class-action settlement covering premature
      connecting-rod bearing wear on Theta II and Nu-engine vehicles from
      roughly 2011-2021. These are dealer SERVICE CAMPAIGNS, not NHTSA
      safety recalls, so they will never show up in the automated recall
      check in recalls.yaml. Sources found during 2026-07-16 research were
      inconsistent about whether this specific 2.4L Theta II GDI engine (as
      opposed to the 2.0L Nu GDI engine some Tucsons have) is actually in
      scope — not confirmed either way. Enter this VIN at
      autoservice.hyundaiusa.com (Hyundai's own campaign lookup) to check
      for real, rather than guessing from secondhand forum summaries.
    status: open
    createdDate: '2026-07-16'
    completedDate: null
  - id: 5
    title: Confirm exact trim level (Value/SE/SEL/Sport/Limited/Ultimate) and drivetrain details with the family member
    notes: >-
      VIN decode confirmed engine (2.4L Theta II), transmission (6-speed
      automatic), and AWD (HTRAC), but NHTSA's data doesn't pin down the
      exact trim — matters mainly for feature/equipment questions, not for
      the maintenance schedule (which doesn't vary by trim on this
      platform). Low priority.
    status: open
    createdDate: '2026-07-16'
    completedDate: null
  - id: 6
    title: Establish full service history with the family member before trusting "never done" status on any item
    notes: >-
      This is a brand-new entry with only one mileage reading on file
      (~65,865 mi as of March 2026) and zero logged maintenance history
      besides one cabin air filter purchase. Several schedule.yaml items
      (spark plugs at 105K, coolant, transmission fluid, differential/
      transfer case fluid) may already be due or overdue by mileage — but
      the dashboard will show "never done" rather than "overdue" until
      actual service history is logged. Ask the family member for whatever records/
      receipts she has (dealer, independent shop, DIY) before assuming
      nothing has been done.
    status: open
    createdDate: '2026-07-16'
    completedDate: null
  - id: 7
    title: 'Standing plan: the family member comes over every spring for a tune-up, every fall for an oil change (minimum)'
    notes: >-
      New fleet-wide policy from Brady (2026-07-16): the family member should come over
      every SPRING to get her Tucson tuned up alongside Brady's own cars —
      same seasonal routine as the rest of the fleet (battery load test,
      wiper blade check, fluid checks, etc.). Then every FALL, at minimum,
      each car — including hers — gets an oil change, so every car ends up
      with at least 2 oil changes/year regardless of actual mileage. This is
      an ongoing standing arrangement, not a one-time to-do — leaving it open
      as a recurring reminder rather than marking it done after any single
      instance. This car's oil-change schedule item was already at a
      6-month interval before this policy (Hyundai's own normal-schedule
      figure happens to match), so no schedule.yaml change was needed here
      specifically — Zeus, Hera, and Lexus needed their oil-change intervals
      tightened from 12 to 6 months to comply.
    status: open
    createdDate: '2026-07-16'
    completedDate: null
