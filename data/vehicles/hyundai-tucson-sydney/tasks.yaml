    title: Get license plate and exact tire size for the family member's Tucson
    notes: >-
      Originally a broader "gather basic details" task, added 2026-07-14
      from a single AutoZone cabin air filter purchase. RESOLVED 2026-07-16:
      Brady supplied the VIN ([VIN-REDACTED]), color (black), and a March
      2026 odometer reading (~65,865 mi) — VIN decode via NHTSA vPIC
      confirmed 2020 model year, 2.4L GDI Theta II, AWD (HTRAC), 6-speed
      automatic, built in Ulsan, South Korea. schedule.yaml has been fully
      tailored to this year/engine and the recall check has been run (see
      recalls.yaml). Still outstanding: exact trim (NHTSA's VIN decode
