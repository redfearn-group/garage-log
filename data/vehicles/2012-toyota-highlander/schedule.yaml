# 2012 Toyota Highlander SE AWD, 2GR-FE 3.5L V6, U660E 6-speed automatic.
# Intervals below are Toyota's NORMAL-schedule specs. Toyota's maintenance
# booklet sets a 5,000 mi / 6 mo "service rhythm" (tire rotation + fluid/
# filter checks at every visit), but that does NOT mean an oil-and-filter
# change every visit — with 0W-20 full synthetic the 2GR-FE's actual oil
# change interval is 10,000 mi / 12 mo under normal use. Severe-duty figures
# (frequent short trips, dusty/stop-and-go driving, towing) are noted where
# they differ, but the numeric interval here is the normal one.
#
# Sources (verified 2026-07-16, re-audited against the primary document text):
#  - Toyota Warranty & Maintenance Guide, Highlander (2013 model year guide,
#    same 2GR-FE/U660E powertrain as this 2012; assets.sia.toyota.com
#    T-MMS-13Highlander/pdf/2013_Toyota_Highlander_WMG.pdf) — downloaded and
#    read directly (Schedule B, V6 Engines tables + "Explanation of
#    Maintenance Items" section) rather than trusted via aggregator summary.
#  - Toyota official oil-change-interval clarification, confirmed in the WMG
#    itself: "For VEHICLES CERTIFIED FOR 0W20 motor oil, the oil change
#    interval is 10,000 miles or 12 months IF 0W20 MOTOR OIL IS BEING USED."
#    The 5,000 mi figure is the fluid-check/rotation rhythm, or the severe-
#    duty oil interval.
#  - Aggregated dealer maintenance-schedule pages (Toyota of Des Moines,
#    Galaxy Toyota, KBB) used only as secondary cross-checks, not primary
#    sourcing, for transmission/differential community-interval framing.
#
# 2026-07-16 audit corrections against the primary WMG PDF text:
#  - cabin-air-filter was wrong: file previously said 15,000 mi/12 mo
#    (aggregator-sourced); the actual WMG places "Replace cabin air filter"
#    only at the 30,000/60,000/90,000/120,000 mi (36/72/108/144 mo) service
#    points for both Schedule A and B. Corrected to 30,000 mi/36 mo.
#  - engine-air-filter mileage (30,000 mi) was already correct but
#    intervalMonths was null; the WMG lists it at "30,000 miles or 36
#    months" (recurring), so intervalMonths corrected to 36.
#  - brake-fluid-flush previously implied a "Toyota time-based, every 3
#    years" factory spec; the WMG for this vehicle contains no scheduled
#    brake-fluid replacement item at all (inspection of "brake lines and
#    hoses" only). Re-labeled as a community-sourced estimate, no Toyota
#    citation exists for this vehicle.
#  - coolant-flush recurring time figure (60 mo) was previously a derived/
#    estimated value; a literal Toyota footnote in this WMG was located
#    confirming it directly ("Initial replacement at 100,000 miles/120
#    months. Replace every 50,000 miles/60 months thereafter.") — no longer
#    a derivation.
#  - spark-plugs (120,000 mi/144 mo) confirmed directly against the WMG's
#    Schedule B V6 table; the alternate 60,000 mi figure floating around
#    dealer sites does not appear anywhere in Toyota's own document for this
#    powertrain.
#  - oil-change, tire-rotation, multi-point-inspection, brake-inspection,
#    transmission-fluid-service, rear-diff-transfer-case (including the
#    front-vs-rear 30k/15k inspection split) were all independently
#    re-checked against the WMG tables and are unchanged — figures were
#    already correct.
#
# Prior version of this file used a 5,000 mi oil-change interval sourced from
# SEO round-up sites that don't distinguish the service rhythm from the
# actual oil-change interval; corrected in an earlier pass.
items:
  - itemType: oil-change
    name: >-
      Oil & filter change (0W-20 full synthetic, ~6.4 qt) — Toyota normal
      10,000 mi/12 mo. BRADY'S POLICY (2026-07-16): every car in the fleet
      gets a minimum of 2 oil changes/year regardless of mileage (spring
      tune-up + fall oil change) — 6 mo below reflects that standing
      policy, not Toyota's own 12 mo normal-schedule allowance.
    intervalMiles: 10000
    intervalMonths: 6
  - itemType: tire-rotation
    name: Tire rotation — Toyota's standard 5,000 mi/6 mo service rhythm
    intervalMiles: 5000
    intervalMonths: 6
  - itemType: multi-point-inspection
    name: Multi-point inspection / fluid level checks — with each 5,000 mi service
    intervalMiles: 5000
    intervalMonths: 6
  - itemType: cabin-air-filter
    name: >-
      Cabin air filter — Toyota normal-schedule 30,000 mi/36 mo (confirmed
      in 2013 Highlander WMG Schedule A/B tables). UPDATED 2026-07-22:
      Hera runs a K&N washable/reusable cabin air filter (VF2000), washed
      every spring rather than replaced on Toyota's mileage interval —
      confirmed clean and working as of 2026-07-22 (a 2024-05-15 wash is
      logged, but not itemType-tagged, which made this look overdue by
      the schedule's automated calculation — it isn't). Brady plans to
      switch to disposable filters starting spring 2027 (see tasks.yaml).
    intervalMiles: 30000
    intervalMonths: 36
  - itemType: engine-air-filter
    name: >-
      Engine air filter — Toyota normal-schedule 30,000 mi/36 mo (confirmed
      in 2013 Highlander WMG Schedule A/B tables). UPDATED 2026-07-22:
      Hera runs a K&N washable/reusable engine air filter (33-2260), washed
      every spring rather than replaced on Toyota's mileage interval —
      confirmed clean and working as of 2026-07-22 (same 2024-05-15
      untagged wash and same automated-overdue-flag caveat as the cabin
      filter above). Brady plans to switch to disposable filters starting
      spring 2027 (see tasks.yaml).
    intervalMiles: 30000
    intervalMonths: 36
  - itemType: brake-inspection
    name: Brake inspection (pads/rotors) — with each service
    intervalMiles: 5000
    intervalMonths: 6
  - itemType: brake-fluid-flush
    name: >-
      Brake fluid — Toyota's own Warranty & Maintenance Guide for this
      vehicle does NOT list a scheduled brake-fluid replacement item at all
      (only visual "brake lines and hoses" inspection); there is no fixed
      Toyota factory interval to cite here. COMMUNITY NOTE: industry/Toyota-
      tech consensus (independent shops, other Toyota owner's-manual
      language for models that do specify it) is every 2-3 years regardless
      of mileage to control moisture/corrosion; 36 mo below is the
      conservative end of that community range, not a literal Toyota
      citation for this vehicle.
    intervalMiles: null
    intervalMonths: 36
  - itemType: coolant-flush
    name: >-
      Engine coolant (Toyota Super Long Life Coolant, pink) — FIRST change
      100,000 mi/120 mo, then every 50,000 mi/60 mo thereafter. Confirmed by
      a literal citation in the 2013 Highlander Warranty & Maintenance
      Guide footnote: "Initial replacement at 100,000 miles/120 months.
      Replace every 50,000 miles/60 months thereafter." (both the recurring
      mileage AND recurring time figures below are directly stated by
      Toyota for this vehicle, not derived.)
    intervalMiles: 50000
    intervalMonths: 60
  - itemType: transmission-fluid-service
    name: >-
      Transmission fluid (U660E, Toyota WS ATF) — no fixed normal-use
      interval in Toyota's guide (fill-for-life under normal conditions);
      Toyota's severe-duty schedule calls for a drain-and-fill around 60,000
      mi, which is the reasonable proactive interval for a car with unknown
      prior fluid history like this one. COMMUNITY NOTE: Toyota techs
      commonly recommend proactive changes every 60,000-100,000 mi on any
      "sealed"/lifetime Toyota transmission regardless of official stance;
      some Highlander owners report noticeably cleaner fluid doing it every
      25,000-30,000 mi. 60,000 mi below is a reasonable middle ground given
      unknown history.
    intervalMiles: 60000
    intervalMonths: null
  - itemType: spark-plugs
    name: >-
      Spark plugs (iridium, 2GR-FE V6) — confirmed directly in the 2013
      Highlander Warranty & Maintenance Guide, Schedule B (V6 engines):
      "Replace spark plugs" appears only at the "120,000 miles or 144
      months" service table. (Some dealer/aggregator pages cite 60,000 mi;
      that figure does not appear in Toyota's own document for this
      powertrain and is disregarded here.)
    intervalMiles: 120000
    intervalMonths: 144
  - itemType: rear-diff-transfer-case
    name: >-
      Front/rear differential + transfer case fluid (AWD) — Toyota AWD
      Highlander: inspect at 30,000 mi intervals, replace only if
      contaminated/severe use (no fixed normal-use replacement interval).
      COMMUNITY NOTE: Toyota's own manual actually specifies more frequent
      INSPECTION than this item's interval reflects — rear diff/transfer
      case every 15,000 mi/18 mo, front diff every 30,000 mi/36 mo under
      normal use (severe: replace every 15,000 mi); forum consensus for
      proactive replacement (not just inspection) is every 20,000-30,000
      mi given this car's high mileage and unknown prior service.
    intervalMiles: 30000
    intervalMonths: null
  - itemType: battery-test
    name: 12V battery load test — part of Brady's annual spring tune-up routine
    intervalMiles: null
    intervalMonths: 12
  - itemType: battery-12v
    name: 12V battery replacement (typical service life ~4-5 yr; last replaced 2024-02-19)
    intervalMiles: null
    intervalMonths: 60
  - itemType: wiper-blades
    name: >-
      Wiper blades — Brady checks these every spring during the seasonal
      tune-up, but only actually replaces them roughly every other year
      once they get streaky (sometimes sooner if damaged). 24 mo below
      reflects the real replacement cadence, not the annual spring check.
    intervalMiles: null
    intervalMonths: 24
