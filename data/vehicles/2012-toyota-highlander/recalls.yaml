      the 2012 Toyota Highlander. Toyota has already had a Class Action Lawsuit for this same
      problem in 2014 for their other Toyota models.
    dateReceived: 08/23/2023
  - component: STRUCTURE
    summary: >-
      The contact owns a 2012 Toyota Highlander. The contact stated that he noticed that the front
      and rear driver’s side and rear passenger’s side carpet were soaked with water. The contact
      then stated that he also noticed the water had leaked from the sunroof. The vehicle was taken
      to an independent mechanic where it was diagnosed that water had entered through the sunroof
      due to the drain tube being improperly designed. The contact stated that he was concerned
      because of two visible electrical connectors near the front driver’s side floorboard and
      possible mold, corrosion, and rust. An undisclosed dealer was notified of the failure and the
      contact was informed that he would receive a call back but no response was received. The
      manufacturer was not notified of the failure. The failure mileage was approximately 128,000.
    dateReceived: 06/27/2023
  - component: ENGINE
    summary: >-
      Around 112,500 miles our vehicle's oil pressure light came on. My husband drove it home, and
      our mechanic told us to tow it to his shop for inspection. The next day I drove it to the
      shop, which was only a few miles away, and my mechanic informed us that there was "no oil
      left" inside the engine and that it was a miracle the engine didn't seize on the way. We left
      it at the shop, a certified Toyota mechanic, overnight for inspection.   The next day our
      mechanic informed us that the piston rings in the engine have failed and oil was burning
      internally. Every service had been done on this vehicle by a Toyota dealership or a certified
      mechanic. We were shocked considering the mileage on the vehicle.  We have since discovered
      that the V4 engine in this vehicle was also problematic with Camrys and other Toyotas, but
      that the recalls were only repaired prior to 60k miles and our vehicle was not apart of that
      service bulletin, even though it was the same problem and same engine.  We could have been on
      the interstate with our 4 and 6 year old children in the vehicle if the engine seized. This is
      a tremendous engine issue and we understand that soon the engine will produce smoke that could
      blow into the vehicle.  We have calculated that a quart of oil is being burned every 600 or so
      miles.
    dateReceived: 05/31/2023
