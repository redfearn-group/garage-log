  - component: SERVICE BRAKES
    summary: >-
      All brake warning indicators lit up. Took it to a mechanic that specializes in hybrids and
      they diagnosed it as a brake assembly/actuator issue, with a diagnostic code of C1391, with a
      repair estimate of $4888. Found online that there was a Toyota Customer Support Program 21TE03
      that addressed this issue, but my vehicle was outside of both the primary and secondary
      coverage periods. My issue is that if they knew this was a very serious safety defect for
      older hybrid vehicles, why would they only offer to address it during a very short period of
      time?? There are many people reporting online that the same thing happened to them (problem
      arose after coverage period expired). Toyota says they “care about the customers’ ownership
      experience,” but by neglecting to help those of us experiencing this issue, they are showing
      the exact opposite. Hope you will help the roughly 74,700 owners potentially impacted by this,
      by encouraging Toyota to be accountable for the safety of their owners. Thanks.
    dateReceived: 08/17/2024
