recalls:
  - campaignNumber: 13V014000
    component: AIR BAGS:FRONTAL:SENSOR/CONTROL MODULE-INACTIVE
    summary: >-
      Southeast Toyota Distributors, LLC (SET) is recalling certain models interspersed through
      model years 2009 through 2013 as follows: model year 2009-2012 Tacoma, 4Runner, Camry, Camry
      Hybrid, Prius, and RAV4; model year 2009-2010 Avalon, FJ Cruiser, and Highlander Hybrid; model
      year 2010-2013 model year Corolla, Sienna and Tundra; model year 2009-2013 Highlander and
      Venza; model year 2012 Prius V; and model year 2010-2012 Sequoia.  During modification by SET
      to include accessories such as leather seat covers, seat heaters or headrest DVD systems,
      these vehicles may not have had the passenger seat occupant sensing system calibration
      tested.  Without passing the calibration test, the occupant sensing system may not operate as
      designed.
    reportedDate: 16/01/2013
  - campaignNumber: 13V123000
    component: EQUIPMENT:OTHER:LABELS
    summary: >-
      Southeast Toyota is recalling certain model year 2008 and 2010-2013 Toyota Tundra, 2010-2012
      Rav4, 2012 Toyota Sequoia, 2010-2011 Toyota Corolla, 2010-2011 Toyota Camry and Camry Hybrid,
      2010-2013 Toyota Highlander and Highlander Hybrid, 2010-2013 Toyota FJ Cruiser, 2011 Toyota
      Land Cruiser, 2010-2013 Toyota Venza, 2010-2011 Toyota 4Runner, 2010-2013 Toyota Tacoma,
      2011-2012 Toyota Sienna, 2012 Toyota Prius, 2013 Scion FR-S, 2011 Scion XD, 2011 Scion XB, and
      2012 Scion TC vehicles.  These vehicles were sold with labels that were outside the allowable
      one percent of accuracy of actual weight added.  Thus,  these vehicles fail to comply with the
      requirements of Federal Motor Vehicle Safety Standard (FMVSS) Number 110, "Tire Selection and
      Rims."
    reportedDate: 09/04/2013
