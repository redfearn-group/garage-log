  - component: SERVICE BRAKES,FORWARD COLLISION AVOIDANCE
    summary: >-
      I was driving and arrived home and suddenly lost my braking and almost hit my house if I
      didn't steer the wheel towards my lawn and put on my parking brake it would have been a
      disaster.  I felt so unsafe that I had my vehicle towed for repair and had to replace the
      brake master cylinder.  Two weeks later, we went on a family trip and  parked my vehicle with
      my family and it was on a slight slope and went to put on the parking brake and it was still
      slightly moving forward only to put my vehicle in reverse QUICKLY in order in NOT DRIVE INTO A
      LAKE WITH MY FAMILY IN THE vehicle!!!  I have just read the complaints and this is an ongoing
      problem since 2011 and I am quite SHOCKED that this is NOT ON RECALL!!!  My wife has a Prius V
      2013 and have not had any problems at all, BUT has a recall on a Brake Hydro-Boost pump fail
      for her vehicle, BUT nothing is wrong with her brakes, ONLY THE 2012 TOYOTA HIGHLANDER!!! 
      Please let me know what Toyota needs to do to get this this fixed!!!  I know there are
      probably more that no one is reporting this and I guess there must be a fatality in order for
      Toyota to fix this problem!!!!
    dateReceived: 08/09/2022
  - component: SERVICE BRAKES
    summary: >-
      The Brake Hydro-Boost pump failed while driving on I-75. Subsequently almost all braking was
      lost on the vehicle.  I have researched similar failures on the same model brake pump
      assemblies, and feel that this is a very unsafe failure condition for the vehicle.  The repair
      cost for this failure is exorbitant given the rate of failure which seems to exist with this
      make/model.  Luckily I was driving the vehicle at the time and had the presence of mind to
      allow the vehicle to roll to a stop using engine braking.  This failure could have caused a
      multiple fatality accident in may opinion.  Toyota is negligent in their care regarding theses
      failures.
    dateReceived: 06/15/2022
  - component: VEHICLE SPEED CONTROL
    summary: >-
