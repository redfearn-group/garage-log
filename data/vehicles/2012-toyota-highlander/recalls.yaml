  - component: POWER TRAIN,ENGINE
    summary: >-
      Toyota Piston and Ring defect.  My 2012 Toyota Highlander engine has defective pistons and
      rings that have led to excessive oil consumption and the potential for a serious accidents as
      it causes the engine to lose compression and conk out, all of a sudden, in traffic, and costly
