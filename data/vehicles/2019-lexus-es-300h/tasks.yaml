  - id: 4
    title: 'TOMORROW before calling dealer: verify the amp is actually the bad part'
    notes: >-
      DONE 2026-07-22: Brady ended up ordering the amp on eBay 2026-07-15
      instead of going the dealer-install route decided below — see task
      #8, now closed. The amp is installed and working well; this whole
      line of work is resolved.

      Decision made 2026-07-10: having the dealer order the correct part
      (86280-06260) and install it, ~$200 out of pocket — worth it for
      speed + warranty, since DIY sourcing (new-only, $863-869 at
      LexusPartsNow/AutoPartsPrime) barely undercuts the dealer once
      labor/shop fees are added, and no used correct-part-number units
      exist yet in the salvage market. Do NOT buy a used amp off eBay
      labeled just "2019 ES300h amplifier" — common listings are part
      86280-33310, which is one of the confirmed BAD pre-fix cores per
      the TSB, not the fix.

      Two checks before/while calling the dealer, to make sure this is
      really the amp and not something else (e.g. a blown speaker):

      1) VIN CHECK (already done): this car's production sequence
      (2033784) falls BEFORE the TSB's fix cutoff (2047220 for
      Japan-built cars) — strong evidence the amp really is the pre-fix
      part, not just an assumption.

      2) PHYSICAL PART NUMBER: the amp is under the driver's seat on
      2013-2019 ES models — slide the seat forward, look for a metal box
      with a Toyota/Lexus part-number sticker on it. Should read
      86280-06230, 06231, 33310, or 33311 (bad/needs fix). If it already
      says 86280-06260, something else is going on — stop and
      investigate before ordering a part you don't need.

      3) RULE OUT BLOWN SPEAKERS (2 min, no tools): head unit → audio
      settings → Balance/Fader. Push fader all the way to REAR, then
      swing balance hard LEFT, then hard RIGHT, listening to each rear
      speaker individually. Both clean but quieter than expected even at
      full rear fade = matches the TSB exactly (amp issue). Any
      distortion, rattling, or silence from one specific rear speaker =
      a separate speaker problem the amp swap won't fix — mention this
      to the dealer before they order the part.
    status: done
    createdDate: '2026-07-10'
    completedDate: '2026-07-22'
  - id: 5
    title: 'DIY Android Auto: still unresolved — nothing confirmed working yet'
    notes: >-
      STATUS as of 2026-07-10: no product has been found with a real,
      dated owner report confirming it adds Android Auto to this car.
      Two earlier candidates have both been RULED OUT after deeper
      research — do not buy either without new evidence:

      - Ottocast Play2Video Ultra ($89) — a Lexus LC owner tested two
      units and reported it "will not work with wireless Android Auto,"
      plus refund/support problems.

      - AAWireless TWO+ ($55-65) — confirmed by multiple independent
      reviews (Android Authority, MobileSyrup) to only convert an
      EXISTING wired Android Auto connection to wireless; the vendor's
      own text says it "does not bring Android Auto or CarPlay to
      vehicles that don't already support it." This car has wired
      CarPlay only, no Android Auto at all, so this device cannot help
      — an earlier recommendation of this product was wrong, based on
      the vendor's marketing page rather than independent verification.

      - CarlinKit's Entune 2.0 module — built for Toyota Entune 2.0
      (Highlander, Tundra, Sienna, etc.), does not list Lexus/Enform 2.0
      as compatible.

      No official Lexus/OEM path exists either (a genuine Beat-Sonic
      CarPlay+Android Auto accessory exists but its compatibility list
      stops at 2018 — a different infotainment generation than this 2019
      car).

      SAVED RESEARCH PROMPT — reuse this for a future research pass or
      to post on ClubLexus/a forum directly:

      ---
      My car is a 2019 Lexus ES 300h (7th-generation ES, Enform 2.0
      infotainment). It has factory wired Apple CarPlay only (via USB)
      — no Android Auto support at all, wired or wireless. The dealer
      confirmed there's no official Lexus upgrade path for this.
      Controls are via a trackpad/Remote Touch controller, not a
      touchscreen.

      I need a device that adds Android Auto to this car. Requirements
      for what counts as "confirmed":
      - Must be a real, dated, identifiable source — a forum post,
      review, or video from an actual owner who used it — not a
      manufacturer's marketing claim or spec sheet
      - Ideally from a 2019+ Lexus ES (300h or 350) owner specifically;
      a close match would be another 2019+ Toyota/Lexus vehicle with the
      same generation Entune 2.0/Enform 2.0 system and
      factory-wired-CarPlay-only setup — flag clearly if a source is a
      close-platform match rather than an exact ES 300h match
      - Must specifically confirm Android Auto works, not just CarPlay
      - Must be a device with its own onboard Android system that
      injects video through the existing wired CarPlay port (an "AI
      box") — NOT a simple wired-to-wireless converter, since those only
      convert a protocol the car already has and can't add one it
      doesn't
      - Note current price and where to buy (prefer Amazon or other
      easily-returnable retailers)

      Already ruled out, do not re-suggest without new contradicting
      evidence: Ottocast Play2Video Ultra, AAWireless TWO+, CarlinKit's
      Entune 2.0 module (see above for why each was ruled out).

      If nothing meets this bar, say so plainly rather than stretching
      weak evidence.
      ---
    status: open
    createdDate: '2026-07-10'
    completedDate: null
