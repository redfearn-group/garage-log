  - component: ELECTRICAL SYSTEM,VEHICLE SPEED CONTROL,ENGINE
    summary: >-
      The first incident occurred sometime in late June/early July...indicator lights mentioned
      below came on and I cleaned off sensors and indicator lamps disappeared on this occurrence. On
      July 13 2022, I was driving on a busy local road when the following malfunction indicators
      were displayed:  brake system warning, 'check' engine malfunction indicator lamp, electric
      power steering system warning, parking support brake system, and pre-collision system.  As
      these indicators were displayed, simultaneously the vehicle decelerated to an almost complete
      stop on the road (though I was pressing gas pedal to floor) and then to a complete stop as I
      was able to blessedly pull over to a gas station without getting hit (the car sounded like
      putt, putt as it shut down).  The vehicle would not start even though I cleaned off the
      sensors this time...I sat for about 15-30 minutes and the vehicle restarted and resume normal
      operations until I was able to get home safely.  This happened again on 15 July 2022 while I
      was driving on I-75N, a truly busy interstate, I was switching lanes to get to the far right
      lane when all of a sudden, the aforementioned indicator lamps displayed and the vehicle
      decelerated to a complete stop as I was able to pull over onto the shoulder of the highway...I
      believe since I had a family member following me, that definitely kept an accident from
      occurring along with the oversight of the good Lord.  While we sat and waited for tow
      services, I tried wiping the sensors to no avail...yet, upon 30 minutes of waiting, the
      vehicle restarted and resumed normal operations.  I drove vehicle to an auto shop in which
      they did a vehicle diagnostics check and couldn't find anything wrong...they even drove
      vehicle to see if problem would reoccur but to no avail.
    dateReceived: 07/22/2022
  - component: POWER TRAIN,ELECTRICAL SYSTEM,ENGINE
    summary: >-
      I leased a 2019 Lexus ES300H in March of 2019. About 1 year later, the vehicle started having
      serious mechanical issues related to the power of the vehicle and put my life in danger on 3
      different occasions. The vehicle has a serious problem with losing power. The very first time
      that this problem occurred, I was in the left only lane attempting to make a left turn. When
      it was safe to do so and there was enough distance between me and the nearest vehicle driving
      in the opposite direction, I pressed on the accelerator to make a left turn and my vehicle
      suddenly lost almost complete power. I had the accelerator pressed all the way to the floor
      and the vehicle was barely moving like 3-5 miles per hour. Me and the other vehicle that was
      coming kind of fast in the opposite direction almost got into a head on collision. I would
      have very easily and safely, without even rushing, cleared the intersection and completed the
      left turn had this not happened. After collecting myself from the terrifying experience I just
      went through and having my life flash before my eyes, pulled over and called Lexus Roadside.
      They came and towed the vehicle to the dealer. The dealer kept the vehicle for some time, but
      was not able to duplicate the problem and told me that there is nothing with the vehicle.
      Regardless of how much I insisted that they do further tests, they refused and told me that
      the mechanic he driven it home at night and back in the morning and could not duplicate the
      issue and that if I didn't come to pick up the vehicle, they would park it on the street where
      it would be subject to tow. After picking it up and literally after about 20 minutes of
      driving it, almost the same thing happened while I was on the freeway on my way home. The
      vehicle lost power again and I almost got into an accident. A similar incident occurred the
      third time. Took the vehicle to service 3 times. Brand engagement has not done a single thing.
      Lemon Law Department denied the case. Been paying.
    dateReceived: 02/09/2022
