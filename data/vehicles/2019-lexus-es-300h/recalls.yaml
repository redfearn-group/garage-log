lastChecked: '2026-07-10'
recalls:
  - campaignNumber: 19V544000
    component: ELECTRONIC STABILITY CONTROL (ESC)
    summary: >-
      Toyota Motor Engineering & Manufacturing (Toyota) is recalling certain 2019 Lexus LS500,
      LC500, ES300h, UX250h, LS500h, Toyota Prius, RAV4 HV, 2019-2020 Toyota Prius Prime, and 2020
      Corolla HV vehicles.  The brake booster pump may fail causing a deactivation of the Vehicle
      Stability Control system and a loss of braking assist.  As such, these vehicles fail to comply
      with the requirements of Federal Motor Vehicle Safety Standard (FMVSS) number 126, "Electronic
      Stability Control Systems."
    reportedDate: 24/07/2019
