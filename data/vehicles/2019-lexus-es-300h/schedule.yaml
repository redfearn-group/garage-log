# 2019 Lexus ES 300h, A25A-FXS 2.5L hybrid, eCVT.
#
# Source (verified 2026-07-15, primary document): 2016 Lexus ES 300h
# Warranty & Services Guide, official Lexus/Toyota PDF
# (assets.sia.toyota.com, L-MMS-16ES300H) — the Scheduled Maintenance Log
# table (pages 48-67) and Explanation of Maintenance Items (pages 68-72).
# This is the SAME A25A-FXS/eCVT hybrid powertrain generation as this 2019
# car (7th-gen ES, 2019-2024), and Lexus does not change this schedule
# across a generation, so it applies directly. All intervals below are
# read directly off that table, not aggregated from third-party sites.
#
# The Lexus schedule has a 6 mo/5,000 mi "visit rhythm" (fluid checks,
# tire rotation, brake/wiper inspection at EVERY visit) that is separate
# from the oil-change interval — do not confuse the two. Oil/cabin filter
# are changed at every OTHER visit (12 mo/10,000 mi), matching engine
# air filter/brake fluid at every 6th visit (36 mo/30,000 mi), etc.
items:
  - itemType: oil-change
    name: >-
      Oil & filter change (0W-16 full synthetic, 4.8 qt, filter
      04152-YZZA1) — Lexus normal 12 mo/10,000 mi (NOT the 6 mo/5,000 mi
      visit rhythm, which is a fluid-check/rotation visit, not
      necessarily an oil change)
    intervalMiles: 10000
    intervalMonths: 12
  - itemType: tire-rotation
    name: Tire rotation — done at every scheduled visit, 6 mo/5,000 mi
    intervalMiles: 5000
    intervalMonths: 6
  - itemType: brake-inspection
    name: Visual brake pad/caliper/rotor inspection — done at every scheduled visit, 6 mo/5,000 mi
    intervalMiles: 5000
    intervalMonths: 6
  - itemType: wiper-blades
    name: Wiper blade inspection — done at every scheduled visit, 6 mo/5,000 mi; replace when cracked/streaking
    intervalMiles: 5000
    intervalMonths: 6
  - itemType: cabin-air-filter
    name: Cabin air filter (87139-YZZ20) — replaced at the same 12 mo/10,000 mi cadence as the oil change
    intervalMiles: 10000
    intervalMonths: 12
  - itemType: engine-air-filter
    name: Engine air filter (17801-31110, verify fit against VIN) — Lexus 36 mo/30,000 mi
    intervalMiles: 30000
    intervalMonths: 36
  - itemType: brake-fluid-flush
    name: Brake fluid replacement — Lexus 36 mo/30,000 mi, whichever occurs first (not purely time-based)
    intervalMiles: 30000
    intervalMonths: 36
  - itemType: engine-coolant-flush
    name: >-
      Engine coolant (Toyota Super Long Life Coolant, pink/50-50) —
      FIRST replacement at 120 mo/100,000 mi, then every 60 mo/50,000 mi
      thereafter — separate system from inverter coolant below
    intervalMiles: 50000
    intervalMonths: 60
  - itemType: inverter-coolant-flush
    name: >-
      Inverter coolant (same Toyota Super Long Life Coolant spec,
      separate reservoir/system from engine coolant) — FIRST replacement
      at 180 mo/150,000 mi, then every 60 mo/50,000 mi thereafter. The
      interval below (50,000 mi/60 mo) is the RECURRING figure that
      applies once the first service is logged — the true first-due point
      is the higher 150,000 mi/180 mo figure, but this app always computes
      the next due point as last-logged + this interval, so the recurring
      number belongs here, not the first-occurrence one. No due-mileage is
      shown at all until the first entry is logged, so this doesn't cause
      premature nagging before the real first-due point.
    intervalMiles: 50000
    intervalMonths: 60
  - itemType: transmission-fluid-service
    name: >-
      eCVT transaxle — Lexus states the transaxle and its fluid are a
      SEALED unit with NO scheduled fluid check or replacement, and there
      is no dipstick. The only manufacturer-specified service is a visual
      leak inspection of the transaxle/front differential case, which
      appears on the schedule every 30,000 mi (18, 36, 54... mo). This
      entry tracks that leak inspection — it is NOT a fluid change
      interval. Any proactive fluid drain-and-fill some owners perform is
      outside Lexus's specification, not a manufacturer requirement.
      COMMUNITY NOTE: the "sealed" stance is genuinely contested even among
      Toyota/Lexus techs — Toyota Canada lists a 72 mo/96,000 km (~60,000
      mi) interval for the mechanically-identical Camry Hybrid transaxle,
      and forum-reported independent practice ranges 60,000-90,000 mi (or
      6-9 yr) using Toyota ATF-WS. Some dealer service managers refuse to
      touch it at all, arguing a change can disturb debris and cause more
      harm than leaving it alone on a high-mileage, unknown-history unit —
      so this is a genuine judgment call, not a clear-cut community
      consensus like the other vehicles' fluids.
    intervalMiles: 30000
    intervalMonths: null
  - itemType: spark-plugs
    name: >-
      Spark plugs (iridium, part 9091901259 — verify at parts counter) —
      Lexus 120,000 mi (only appears once, at the 144-month/120,000-mile
      line, so mileage is the effective trigger) — do NOT replace early
    intervalMiles: 120000
    intervalMonths: null
  - itemType: battery-12v
    name: >-
      12V auxiliary battery (Group 55B24R, in trunk behind left panel) —
      NOT a manufacturer-scheduled interval (Lexus's guide gives no fixed
      replacement interval, only "replace when needed"); the figure below
      is a general AGM-battery service-life estimate, not a Lexus spec
    intervalMiles: null
    intervalMonths: 72
  - itemType: hybrid-battery-fan-filter
    name: >-
      Hybrid battery cooling fan filter — clean (behind right rear seat
      trim, per TSB L-SB-0028-20). This is a Technical Service Bulletin
      item, not part of the core Lexus maintenance schedule above.
    intervalMiles: 20000
    intervalMonths: null
