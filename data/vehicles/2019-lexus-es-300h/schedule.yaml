# 2019 Lexus ES 300h, A25A-FXS 2.5L hybrid, eCVT.
#
# Source (re-verified 2026-07-16, primary document): 2020 Lexus ES 300h
# Warranty & Services Guide, official Lexus/Toyota PDF
# (assets.sia.toyota.com, L-MMS-20ES300h) — the Scheduled Maintenance Log
# table (pages 48-67) and Explanation of Maintenance Items (pages 68-72).
# CORRECTION: this file previously cited the 2016 ES 300h WSG
# (L-MMS-16ES300H) as "same generation" — that is WRONG. The 2016 ES 300h
# is 6th-gen (2013-2018) with the 2AR-FXE 2.5L engine and 0W-20 oil spec.
# The 2019 car is 7th-gen (2019-2024) with the all-new A25A-FXS engine
# and a 0W-16 oil spec, plus a factory HV-battery-cooling-filter check
# that doesn't exist on the 6th-gen schedule at all. The 2020 MY document
# used now IS the same 7th-gen A25A-FXS/eCVT platform as this 2019 car,
# and Lexus does not change this schedule within a generation, so it
# applies directly. All intervals below are read directly off that table,
# not aggregated from third-party sites. Despite the wrong source doc,
# nearly all the interval NUMBERS below already matched (Lexus kept the
# same visit rhythm across generations) — the exceptions are noted at the
# relevant items below.
#
# The Lexus schedule has a 6 mo/5,000 mi "visit rhythm" (fluid checks,
# tire rotation, brake/wiper inspection at EVERY visit) that is separate
# from the oil-change interval — do not confuse the two. Oil/cabin filter
# are changed at every OTHER visit (12 mo/10,000 mi), matching engine
# air filter/brake fluid at every 6th visit (36 mo/30,000 mi), etc.
items:
  - itemType: oil-change
    name: >-
      Oil & filter change (0W-16 full synthetic — SAE 0W-20 is an
      acceptable substitute only until the next change, per the 2020
      ES 300h WSG; verify capacity/filter part at parts counter) — Lexus
      normal 12 mo/10,000 mi (NOT the 6 mo/5,000 mi visit rhythm, which
      is a fluid-check/rotation visit, not necessarily an oil change).
      BRADY'S POLICY (2026-07-16): every car in the fleet gets a minimum
      of 2 oil changes/year regardless of mileage (spring tune-up + fall
      oil change) — 6 mo below reflects that standing policy, not Lexus's
      own 12 mo normal-schedule allowance.
    intervalMiles: 10000
    intervalMonths: 6
  - itemType: tire-rotation
    name: Tire rotation — done at every scheduled visit, 6 mo/5,000 mi
    intervalMiles: 5000
    intervalMonths: 6
  - itemType: brake-inspection
    name: Visual brake pad/caliper/rotor inspection — done at every scheduled visit, 6 mo/5,000 mi
    intervalMiles: 5000
    intervalMonths: 6
  - itemType: wiper-blades
    name: Wiper blade inspection — done at every scheduled visit, 6 mo/5,000 mi; replace when cracked/streaking
    intervalMiles: 5000
    intervalMonths: 6
  - itemType: cabin-air-filter
    name: Cabin air filter (87139-YZZ20) — replaced at the same 12 mo/10,000 mi cadence as the oil change
    intervalMiles: 10000
    intervalMonths: 12
  - itemType: engine-air-filter
    name: Engine air filter (17801-31110, verify fit against VIN) — Lexus 36 mo/30,000 mi
    intervalMiles: 30000
    intervalMonths: 36
  - itemType: brake-fluid-flush
    name: Brake fluid replacement — Lexus 36 mo/30,000 mi, whichever occurs first (not purely time-based)
    intervalMiles: 30000
    intervalMonths: 36
  - itemType: engine-coolant-flush
    name: >-
      Engine coolant (Toyota Super Long Life Coolant, pink/50-50) —
      FIRST replacement at 120 mo/100,000 mi, then every 60 mo/50,000 mi
      thereafter — separate system from inverter coolant below
    intervalMiles: 50000
    intervalMonths: 60
  - itemType: inverter-coolant-flush
    name: >-
      Inverter coolant (same Toyota Super Long Life Coolant spec,
      separate reservoir/system from engine coolant) — FIRST replacement
      at 180 mo/150,000 mi, then every 60 mo/50,000 mi thereafter. The
      interval below (50,000 mi/60 mo) is the RECURRING figure that
      applies once the first service is logged — the true first-due point
      is the higher 150,000 mi/180 mo figure, but this app always computes
      the next due point as last-logged + this interval, so the recurring
      number belongs here, not the first-occurrence one. No due-mileage is
      shown at all until the first entry is logged, so this doesn't cause
      premature nagging before the real first-due point.
    intervalMiles: 50000
    intervalMonths: 60
  - itemType: transmission-fluid-service
    name: >-
      eCVT transaxle — Lexus states the transaxle and its fluid are a
      SEALED unit with NO scheduled fluid check or replacement, and there
      is no dipstick. The only manufacturer-specified service is a visual
      leak inspection of the transaxle/front differential case, which
      appears on the schedule every 30,000 mi/36 mo (36, 72, 108... mo —
      corrected from a prior transcription error that said "18, 36,
      54... mo"; the leak check does NOT appear on the 18-month/15,000-mi
      visit or other non-36-month-multiple visits, only every 3rd year).
      This entry tracks that leak inspection — it is NOT a fluid change
      interval. Any proactive fluid drain-and-fill some owners perform is
      outside Lexus's specification, not a manufacturer requirement.
      COMMUNITY NOTE: the "sealed" stance is genuinely contested even among
      Toyota/Lexus techs, and forum-reported independent practice ranges
      60,000-90,000 mi (or 6-9 yr) using Toyota ATF-WS. Some dealer service
      managers refuse to touch it at all, arguing a change can disturb
      debris and cause more harm than leaving it alone on a high-mileage,
      unknown-history unit — so this is a genuine judgment call, not a
      clear-cut community consensus like the other vehicles' fluids.
      UNCONFIRMED CLAIM (flagged, not stated as fact): forum posts widely
      repeat a figure of "Toyota Canada: 72 mo/96,000 km (~60,000 mi)" for
      the mechanically-related Camry Hybrid transaxle. THREE separate
      research passes (the third on 2026-07-16, with working web access)
      have tried and failed to find this figure in any primary Toyota
      Canada document. The 2026-07-16 pass directly pulled and full-text
      searched the 2019 Camry Hybrid US Warranty & Maintenance Guide
      (assets.sia.toyota.com, T-MMS-19CamryHV — same generation/platform,
      same transaxle family as this car) and found ONLY the identical
      "inspect sealed transmissions... for signs of leakage" language at
      every service interval, with no numbered fluid-change mileage/month
      figure anywhere in the document. Toyota Canada guides for the same
      model year are normally near-identical in content to the US guide
      (same maintenance log structure, just bilingual), which is evidence
      AGAINST a materially different hard-interval figure existing in the
      Canadian version, though a genuine Toyota Canada document was still
      not directly located/read to confirm or deny this one way or the
      other. No credible primary source (Toyota Canada PDF, JDM manual, or
      other market's factory schedule) was found for ANY hybrid transaxle
      fluid change interval on this transaxle family — only unsourced
      forum claims and independent shops' own recommendations (e.g. one
      Japanese tire/service shop's page recommending 40,000 km on its own
      authority, not citing any Toyota document). Treat the 72mo/96,000km
      figure as an unverified forum claim, not a confirmed fact, until
      someone locates and reads the actual source document.
    intervalMiles: 30000
    intervalMonths: 36
  - itemType: spark-plugs
    name: >-
      Spark plugs (iridium, part 9091901259 — verify at parts counter) —
      Lexus 120,000 mi (only appears once, at the 144-month/120,000-mile
      line, so mileage is the effective trigger) — do NOT replace early
    intervalMiles: 120000
    intervalMonths: null
  - itemType: battery-test
    name: >-
      12V battery load test (KONNWEI KW208 tester) — ADDED 2026-07-22:
      Brady tests every vehicle's 12V battery twice yearly (spring & fall)
      and records the CCA/SOH/SOC result each time; replacement is
      decided by the test result, not by the battery's age. No test
      logged yet for this car since purchase (2026-06-19) — first one
      due this fall.
    intervalMiles: null
    intervalMonths: 6
  - itemType: battery-12v
    name: >-
      12V auxiliary battery (Group 55B24R, in trunk behind left panel) —
      NOT a manufacturer-scheduled interval (Lexus's guide gives no fixed
      replacement interval, only "replace when needed"). CORRECTED
      2026-07-22: this is an informational "last replaced" record only,
      NOT a schedule-driven due date — Brady explicitly does not want a
      replacement flagged just because the battery has crossed a generic
      age estimate. Replacement happens only when the twice-yearly KW208
      test (see battery-test above) indicates it's needed.
    intervalMiles: null
    intervalMonths: null
  - itemType: hybrid-battery-fan-filter
    name: >-
      HV battery cooling intake filter — clean (behind right rear seat
      trim). CORRECTED: this IS part of the official core Lexus schedule
      for the 7th-gen (2019+) ES 300h — the 2020 ES 300h WSG lists
      "Check HV battery cooling intake filter" at every single 6 mo/
      5,000 mi visit (this item did not exist at all on the 6th-gen/2016
      schedule this file previously cited). That routine item is a
      visual check, not a full clean/service. The actual clean/service
      procedure and its ~20,000 mi interval come from TSB L-SB-0028-20
      (Aug. 2020, "HV Battery Cooling System Maintenance Service"),
      which independent sources describe as inspect-every-5,000-mi,
      clean-every-20,000-mi. This entry tracks that 20,000 mi
      clean/service action, not the every-visit visual check.
    intervalMiles: 20000
    intervalMonths: null
